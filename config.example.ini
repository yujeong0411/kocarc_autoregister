; 이 파일을 복사해서 config.ini 로 저장한 뒤 값을 채우세요.
; config.ini 는 본인 PC에만 두고 절대 공유/업로드하지 마세요. (비밀번호 포함)

[kocarc]
; 사이트 기본 주소
base_url = https://ecrf.kr

; 로그인 화면 주소
login_url = https://ecrf.kr/kocarc/

; 로그인 아이디
member_id = kocarc_14

; 비밀번호. 비워두면 실행할 때 물어봅니다(권장: 비워두기).
password =

; 입력에 사용할 엑셀 양식 파일명
excel = KOCARC_입력양식.xlsx

; true  = 값만 채우고 '저장' 안 함 (안전한 검증 모드)
; false = 실제로 환자 생성 + 저장 (실전)
dry_run = true

; 검증 모드(dry_run=true)에서, 사이트에 미리 만들어 둔 '연습 환자'의 PAT_ID 를 적으면
; 그 환자에 모든 영역을 채워보며 매핑을 눈으로 확인할 수 있습니다(저장 안 함).
; 예) test_pat_id = 14-99999
test_pat_id =

; 브라우저 창을 숨길지 여부 (검증 중엔 false 로 두고 직접 보세요)
headless = false

; 입력할 영역. all 또는 쉼표로:  common,prevent,community,relief,in_hosp,alive_after,heart,y_child,comment
areas = all

; 특정 환자키만 처리하고 싶을 때. 예) only_keys = 1,2  (비워두면 전체)
only_keys =

; 각 입력 사이 지연(초). 사이트가 느리면 늘리세요.
pause = 0.3
